<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Midnight Affair</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> <header class="top-bar">
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </div>
        <h1 id="top-title">Midnight</h1>
        <div class="user-status"><i class="fa-solid fa-circle-check"></i></div>
    </header>

    <main class="app-container">
        <article class="story-content" id="content">
            <div class="loading-state">Pilih kategori di bawah untuk mulai membaca...</div>
        </article>
    </main>

    <nav class="tab-bar">
        <div class="tab-item" onclick="showCategoryMenu('Suami')">
            <i class="fa-solid fa-heart"></i>
            <span>Suami</span>
        </div>
        <div class="tab-item" onclick="showCategoryMenu('Teman Suami')">
            <i class="fa-solid fa-user-group"></i>
            <span>Teman</span>
        </div>
        <div class="tab-item" onclick="showCategoryMenu('3s')">
            <i class="fa-solid fa-fire"></i>
            <span>3S</span>
        </div>
        <div class="tab-item" onclick="showCategoryMenu('Mertua')">
            <i class="fa-solid fa-crown"></i>
            <span>Mertua</span>
        </div>
    </nav>

    <div id="action-sheet" class="overlay" onclick="closeSheet(event)">
        <div class="sheet-container">
            <div class="handle"></div>
            <h2 id="sheet-category-title">Kategori</h2>
            <div id="story-list" class="story-list">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
