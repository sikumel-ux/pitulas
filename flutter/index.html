<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Super App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <header class="main-header">
        <div class="header-content">
            <div class="user-profile">
                <img src="https://i.pravatar.cc/100" alt="User">
                <div class="user-text">
                    <span>Halo, Selamat Datang</span>
                    <strong>User Eksklusif</strong>
                </div>
            </div>
            <button id="theme-toggle" class="theme-btn">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <svg class="curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
            <path fill="#1565C0" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,186.7C960,192,1056,160,1152,138.7C1248,117,1344,107,1392,101.3L1440,96V0H1392C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0H0Z"></path>
        </svg>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Cari layanan atau produk...">
        </div>
    </header>

    <main class="app-body">
        <section class="promo-section">
            <div class="scroll-container">
                <div class="promo-card bg-blue">
                    <span>Promo Minggu Ini</span>
                    <h4>Diskon Gadget 50%</h4>
                </div>
                <div class="promo-card bg-yellow">
                    <span>Voucher Baru</span>
                    <h4>Gratis Ongkir se-Indonesia</h4>
                </div>
                <div class="promo-card bg-dark">
                    <span>Limited Offer</span>
                    <h4>Flash Sale Malam Ini</h4>
                </div>
            </div>
        </section>

        <section class="services-section">
            <div class="section-header">
                <h3>Layanan Kami</h3>
            </div>
            <div class="services-grid">
                <div class="service-item">
                    <div class="icon-circle"><i class="fas fa-bolt"></i></div>
                    <span>Top Up</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle"><i class="fas fa-shopping-bag"></i></div>
                    <span>Belanja</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle"><i class="fas fa-ticket-alt"></i></div>
                    <span>Tiket</span>
                </div>
                <div class="service-item">
                    <div class="icon-circle"><i class="fas fa-ellipsis-h"></i></div>
                    <span>Lainnya</span>
                </div>
            </div>
        </section>

        <section class="catalog-section">
            <div class="section-header">
                <h3>Produk Terpopuler</h3>
                <a href="#">Lihat Semua</a>
            </div>
            <div id="product-grid" class="product-grid">
                </div>
        </section>
    </main>

    <a href="https://wa.me/6281234567890" class="fab-wa">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
