<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cerita Collector</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>

</head>
<body class="bg-white text-gray-800 transition-colors duration-300">

  <div class="max-w-md mx-auto p-4">

    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-semibold">Cerita Collector</h1>
      <button id="theme-toggle" class="text-xl">
        <i class="fa-regular fa-moon"></i>
      </button>
    </header>

    <!-- Form submit cerita -->
    <section class="mb-6">
      <h2 class="text-lg font-medium mb-2">Tambah Cerita</h2>
      <div class="space-y-3">
        <input type="text" id="judul" placeholder="Judul cerita" class="w-full p-2 border rounded">
        <select id="kategori" class="w-full p-2 border rounded">
          <option value="suami">Suami</option>
          <option value="teman">Teman</option>
          <option value="3s">3S</option>
          <option value="mertua">Mertua</option>
        </select>
        <textarea id="isi" rows="4" placeholder="Tulis ceritanya..." class="w-full p-2 border rounded"></textarea>
        <button id="saveBtn" class="w-full bg-blue-600 text-white p-2 rounded">
          <i class="fa-solid fa-save"></i> Simpan Cerita
        </button>
      </div>
    </section>

    <!-- Daftar cerita -->
    <section>
      <h2 class="text-lg font-medium mb-2">Daftar Cerita</h2>
      <div id="listCerita" class="space-y-4"></div>
    </section>

  </div>

<script src="appx.js"></script>
</body>
</html>
