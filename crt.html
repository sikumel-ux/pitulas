<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Private</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffffcc;
  --text:#111;
}
body.dark{
  --bg:#000;
  --card:#1c1c1ecc;
  --text:#fff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}
.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  padding:20px;
  padding-bottom:90px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:24px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.3s;
}
input,textarea,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:16px;
  background:#e9e9ee;
  font-size:14px;
}
body.dark input,
body.dark textarea,
body.dark select{
  background:#2a2a2d;
  color:#fff;
}
button{
  border:none;
  border-radius:20px;
  padding:10px;
  font-weight:600;
  cursor:pointer;
}
.primary{
  background:#000;
  color:#fff;
}
body.dark .primary{
  background:#fff;
  color:#000;
}
.story{
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  background:#000;
  color:#fff;
}
body.dark .badge{
  background:#fff;
  color:#000;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:420px;
  margin:auto;
  background:var(--card);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
}
.icon-btn{
  background:none;
  font-size:18px;
}
.fav{
  color:#ff3b30;
}
.search{
  margin-bottom:15px;
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h2>Cerita Private</h2>
    <button class="icon-btn" onclick="toggleTheme()">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <div class="card">
    <input id="judul" placeholder="Judul cerita">
    <select id="kategori">
      <option value="suami">Suami</option>
      <option value="teman">Teman</option>
      <option value="3s">3S</option>
      <option value="mertua">Mertua</option>
    </select>
    <textarea id="isi" rows="3" placeholder="Tulis cerita..."></textarea>
    <button class="primary" onclick="saveStory()">Simpan</button>
  </div>

  <input id="search" class="search" placeholder="Cari cerita..." oninput="render()">

  <div id="list"></div>

</div>

<div class="bottom-nav">
  <i class="fa-solid fa-book"></i>
  <i class="fa-solid fa-heart"></i>
  <i class="fa-solid fa-user"></i>
</div>

<script>
let stories = JSON.parse(localStorage.getItem("stories")||"[]");

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function saveStory(){
  const judul = document.getElementById("judul").value.trim();
  const isi = document.getElementById("isi").value.trim();
  const kategori = document.getElementById("kategori").value;
  if(!judul || !isi) return;

  stories.unshift({
    id:Date.now(),
    judul,
    isi,
    kategori,
    fav:false
  });

  localStorage.setItem("stories",JSON.stringify(stories));
  document.getElementById("judul").value="";
  document.getElementById("isi").value="";
  render();
}

function toggleFav(id){
  stories = stories.map(s=> s.id===id ? {...s,fav:!s.fav}:s);
  localStorage.setItem("stories",JSON.stringify(stories));
  render();
}

function render(){
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  list.innerHTML = stories
    .filter(s=> s.judul.toLowerCase().includes(search) || s.isi.toLowerCase().includes(search))
    .map(s=>`
      <div class="card story">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>${s.judul}</strong>
          <i class="fa-solid fa-heart ${s.fav?'fav':''}" onclick="toggleFav(${s.id})"></i>
        </div>
        <div style="display:flex;justify-content:space-between;margin:6px 0">
          <span class="badge">${s.kategori}</span>
        </div>
        <div style="font-size:14px;opacity:.8">${s.isi}</div>
      </div>
    `).join("");
}

render();
</script>

</body>
</html>
