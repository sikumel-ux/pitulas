<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cerita Private</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
  transition: background 0.3s, color 0.3s;
}
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.6);
}
.dark .glass {
  background: rgba(30,30,30,0.6);
}
</style>
</head>

<body class="bg-gray-100 text-gray-800">

<div class="max-w-md mx-auto min-h-screen flex flex-col">

  <!-- HEADER -->
  <div class="flex justify-between items-center px-6 pt-8 pb-4">
    <h1 class="text-2xl font-semibold tracking-tight">
      Cerita Private
    </h1>
    <button id="themeBtn" class="text-xl">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 px-6 pb-24 overflow-y-auto">

    <!-- CARD INPUT -->
    <div class="glass rounded-3xl p-5 shadow-xl mb-6">
      <input id="judul" type="text" placeholder="Judul cerita..."
        class="w-full bg-transparent outline-none text-lg font-medium mb-3"/>

      <select id="kategori"
        class="w-full bg-gray-200 dark:bg-gray-700 rounded-2xl p-2 mb-3 text-sm">
        <option value="suami">Suami</option>
        <option value="teman">Teman</option>
        <option value="3s">3S</option>
        <option value="mertua">Mertua</option>
      </select>

      <textarea id="isi" rows="3"
        placeholder="Tulis cerita..."
        class="w-full bg-gray-200 dark:bg-gray-700 rounded-2xl p-3 text-sm resize-none"></textarea>

      <button id="saveBtn"
        class="mt-4 w-full bg-black text-white dark:bg-white dark:text-black rounded-2xl py-2 font-medium active:scale-95 transition">
        Simpan
      </button>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-4"></div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto">
    <div class="glass rounded-t-3xl flex justify-around py-4 shadow-2xl">
      <button class="text-center text-sm">
        <i class="fa-solid fa-book text-lg"></i><br/>
        Cerita
      </button>
      <button class="text-center text-sm">
        <i class="fa-solid fa-heart text-lg"></i><br/>
        Favorit
      </button>
      <button class="text-center text-sm">
        <i class="fa-solid fa-user text-lg"></i><br/>
        Profil
      </button>
    </div>
  </div>

</div>

<script>
const body = document.body;
const themeBtn = document.getElementById("themeBtn");
const saveBtn = document.getElementById("saveBtn");
const list = document.getElementById("list");

// DARK MODE
themeBtn.onclick = () => {
  body.classList.toggle("dark");
  body.classList.toggle("bg-black");
  body.classList.toggle("text-white");

  themeBtn.innerHTML = body.classList.contains("dark")
    ? '<i class="fa-solid fa-sun"></i>'
    : '<i class="fa-solid fa-moon"></i>';
};

// SAVE DATA
saveBtn.onclick = () => {
  const judul = document.getElementById("judul").value;
  const kategori = document.getElementById("kategori").value;
  const isi = document.getElementById("isi").value;

  if(!judul || !isi) return;

  const data = JSON.parse(localStorage.getItem("cerita") || "[]");
  data.unshift({judul, kategori, isi});
  localStorage.setItem("cerita", JSON.stringify(data));

  render();
  document.getElementById("judul").value="";
  document.getElementById("isi").value="";
};

function render(){
  const data = JSON.parse(localStorage.getItem("cerita") || "[]");

  list.innerHTML = data.map(c=>`
    <div class="glass rounded-3xl p-4 shadow-md">
      <div class="flex justify-between mb-2">
        <h3 class="font-semibold">${c.judul}</h3>
        <span class="text-xs bg-black text-white dark:bg-white dark:text-black px-3 py-1 rounded-full">
          ${c.kategori}
        </span>
      </div>
      <p class="text-sm opacity-80">${c.isi}</p>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
